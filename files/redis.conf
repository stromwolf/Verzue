# =============================================================================
# Verzue — Production redis.conf
# =============================================================================
# Target: Hostinger KVM2 VPS (single instance, ~4-8 GB RAM)
# Goal: Durable enough that a hard reboot loses ≤1 second of writes, with
#       sensible memory bounds and ops-friendly logging.
#
# Install path: /etc/redis/redis.conf
# Service: redis-server.service (systemd)
# Apply: sudo systemctl restart redis-server
# Verify: redis-cli CONFIG GET appendonly  →  should return "yes"
# =============================================================================


# -----------------------------------------------------------------------------
# NETWORK
# -----------------------------------------------------------------------------
# Bind to localhost only. The bot connects via REDIS_URL=redis://localhost:6379.
# If you ever expose Redis to the network, bind to a private interface AND set
# `requirepass` AND firewall port 6379. Never expose Redis to the public
# internet — there's no built-in user/pass auth before Redis 6 ACLs and even
# with ACLs the attack surface is too large.
bind 127.0.0.1 ::1
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300


# -----------------------------------------------------------------------------
# GENERAL
# -----------------------------------------------------------------------------
daemonize no              # systemd manages the process; do not double-fork
supervised systemd        # tells Redis to notify systemd when ready
pidfile /var/run/redis/redis-server.pid
loglevel notice           # `notice` is the right balance — `verbose` floods the journal
logfile ""                # empty string = log to stdout, captured by journalctl
databases 16
always-show-logo no


# -----------------------------------------------------------------------------
# SNAPSHOTTING (RDB) — Belt
# -----------------------------------------------------------------------------
# RDB is a point-in-time binary snapshot. Fast to load on restart, compact on
# disk, but you lose everything written since the last snapshot if the process
# dies. We use it as a backup tier alongside AOF.
#
# Save rules format: `save <seconds> <changes>` — snapshot if at least <changes>
# keys changed in <seconds>. Multiple rules combine with OR.
save 900 1                # snapshot if ≥1 key changed in 15 min  (low activity)
save 300 10               # snapshot if ≥10 keys changed in 5 min (moderate)
save 60 1000              # snapshot if ≥1000 keys changed in 1 min (burst)

# If the background save fails (disk full, permissions), STOP accepting writes.
# This is the safe default — silent persistence failure is how you discover
# data loss the day after you needed the data.
stop-writes-on-bgsave-error yes

rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
rdb-del-sync-files no
dir /var/lib/redis        # RDB and AOF both written here


# -----------------------------------------------------------------------------
# APPEND-ONLY FILE (AOF) — Suspenders
# -----------------------------------------------------------------------------
# AOF logs every write op to disk. With appendfsync=everysec we lose at most
# 1 second of writes on a hard crash. This is the primary durability mechanism.
#
# Tradeoff: AOF is larger than RDB on disk and slightly slower at write time.
# Both are acceptable here — Verzue's working set is small (sessions, queue
# entries, dedup hashes). Expect AOF to stay under 100 MB in steady state.
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"

# everysec is the right answer for 99% of workloads:
#   always   — fsync every write. Safest, slowest, brutal on SSDs.
#   everysec — fsync once per second. Loses ≤1s on crash. SWEET SPOT.
#   no       — let the OS decide. Fast, but can lose 30s on crash.
appendfsync everysec

# When a BGSAVE or BGREWRITEAOF is running, fsync is briefly disabled to
# prevent disk contention. `no` here means "don't disable fsync during rewrites"
# which is safer. Set to `yes` only if you see write latency spikes during
# AOF rewrites and you're willing to trade durability for latency.
no-appendfsync-on-rewrite no

# AOF rewrite triggers — Redis compacts the AOF when it grows beyond
# (current_size + current_size * percentage / 100) AND is larger than min-size.
# Defaults are sensible for our load.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# On startup, if the AOF is truncated (incomplete last write from a crash),
# load what's valid and continue. The alternative (`no`) refuses to start,
# requiring manual `redis-check-aof --fix`. `yes` is the right default.
aof-load-truncated yes

# Hybrid persistence: AOF rewrites can embed an RDB preamble for fast loading.
# Significantly speeds up restart on large datasets. Always-on for new deploys.
aof-use-rdb-preamble yes

# AOF timestamp annotations (Redis 7+). Useful for point-in-time recovery
# debugging — you can see when each batch of writes happened.
aof-timestamp-enabled no  # Set to yes if on Redis 7+ and you want PITR debug info


# -----------------------------------------------------------------------------
# MEMORY MANAGEMENT
# -----------------------------------------------------------------------------
# Cap Redis memory so it can't OOM-kill the bot or itself. On an 8 GB VPS
# running the bot + Playwright (historical) + Redis, give Redis 1 GB. Adjust
# upward if your `redis-cli INFO memory | grep used_memory_human` consistently
# bumps the cap.
maxmemory 1gb

# Eviction policy when memory limit is hit. We use `noeviction` because
# losing a session or active_task entry silently is WORSE than the bot
# erroring loudly. If memory pressure is real, fix the leak — don't paper
# over it with LRU eviction.
#
# CAUTION: with noeviction, hitting maxmemory means writes start failing.
# Monitor `redis_used_memory` via $qstats or a Prometheus exporter and alert
# at 80% of maxmemory.
maxmemory-policy noeviction


# -----------------------------------------------------------------------------
# LAZY FREEING — non-blocking deletes
# -----------------------------------------------------------------------------
# Free memory in a background thread instead of blocking the main event loop.
# Costs effectively nothing in CPU and prevents latency spikes on big DEL/FLUSH.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes


# -----------------------------------------------------------------------------
# CLIENT LIMITS
# -----------------------------------------------------------------------------
# The bot's connection pool is capped at 50 (see RedisConnection._setup).
# 256 leaves headroom for redis-cli inspections and a future monitoring
# exporter.
maxclients 256

# Output buffer limits. The defaults are too lenient for pubsub on a small VPS;
# if a subscriber falls behind, the buffer can balloon and OOM Redis.
# Format: <class> <hard limit> <soft limit> <soft seconds>
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60


# -----------------------------------------------------------------------------
# SLOW LOG — your friend when debugging latency
# -----------------------------------------------------------------------------
# Log any command that takes longer than 10ms (10000 microseconds).
# Inspect with: redis-cli SLOWLOG GET 10
slowlog-log-slower-than 10000
slowlog-max-len 128


# -----------------------------------------------------------------------------
# LATENCY MONITOR
# -----------------------------------------------------------------------------
# Tracks operations slower than this threshold. Inspect with:
#   redis-cli LATENCY LATEST
#   redis-cli LATENCY HISTORY event-name
latency-monitor-threshold 100


# -----------------------------------------------------------------------------
# SECURITY
# -----------------------------------------------------------------------------
# Localhost-only + protected-mode is sufficient for a single-VPS deployment.
# If you ever need network access, uncomment requirepass with a strong secret
# AND rotate the bot's REDIS_URL accordingly.
#
# requirepass <generate with: openssl rand -hex 32>
#
# Rename or disable destructive commands. FLUSHALL/FLUSHDB/CONFIG/DEBUG can
# all wreck production via a misclick. We don't disable CONFIG because the
# install scripts use it; we DO disable FLUSHALL.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""        # We have a code TODO to replace KEYS with SSCAN; this enforces it.
rename-command DEBUG ""


# -----------------------------------------------------------------------------
# ADVANCED — leave at defaults unless you have a measured reason
# -----------------------------------------------------------------------------
hash-max-listpack-entries 128
hash-max-listpack-value 64
list-max-listpack-size -2
list-compress-depth 0
set-max-intset-entries 512
set-max-listpack-entries 128
zset-max-listpack-entries 128
zset-max-listpack-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes


# =============================================================================
# POST-INSTALL CHECKLIST
# =============================================================================
# 1. Ensure /var/lib/redis exists and is owned by redis:redis with mode 0750
# 2. Ensure the partition holding /var/lib/redis has at least 4× your expected
#    AOF size free (rewrites need temporary 2× space)
# 3. Disable Linux Transparent Huge Pages (causes latency spikes):
#      echo madvise > /sys/kernel/mm/transparent_hugepage/enabled
#      Make permanent in /etc/rc.local or a systemd unit
# 4. Set vm.overcommit_memory=1 in /etc/sysctl.conf (Redis BGSAVE needs it)
#      sysctl vm.overcommit_memory=1
# 5. Verify after restart:
#      redis-cli CONFIG GET appendonly        # → "yes"
#      redis-cli CONFIG GET maxmemory-policy  # → "noeviction"
#      redis-cli INFO persistence | head -20  # AOF enabled, last_bgsave_status:ok
# =============================================================================
